<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonaLearn-Motion | Explainer Mode</title>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #f3f4f6; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: #0a0a0c; padding: 35px; border-radius: 24px; border: 1px solid #1f1f23; text-align: center; }
        .title { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 5px 0; }
        .sub { color: #9ca3af; font-size: 14px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .scene-card { background: #111115; border: 1px solid #1f1f23; padding: 20px; border-radius: 14px; text-align: left; }
        .scene-card h4 { margin: 0 0 10px 0; font-size: 14px; color: #a5b4fc; display: flex; justify-content: space-between; }
        textarea { width: 100%; background: #18181c; color: #fff; border: 1px solid #2d2d34; padding: 12px; border-radius: 10px; box-sizing: border-box; font-size: 14px; height: 65px; resize: none; outline: none; font-family: inherit; }
        .btn { background: #fff; color: #000; border: none; padding: 14px 28px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px; font-family: inherit; }
        .btn:hover { background: #e5e7eb; }
        .video-box { margin-top: 25px; display: none; background: #111115; padding: 20px; border-radius: 16px; border: 1px solid #1f1f23; }
        video { width: 100%; max-width: 600px; border-radius: 10px; background: #000; margin-top: 15px; }
        .back-link { display: inline-block; margin-top: 20px; color: #9ca3af; text-decoration: underline; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="title">Explainer Sequence Canvas 🎬</h2>
        <p class="sub">Map out your 4 script prompts to build a 1-minute video project.</p>
        
        <div class="grid">
            <div class="scene-card">
                <h4><span>Scene 1</span> <span>0:00 - 0:15</span></h4>
                <textarea id="longP1" placeholder="Describe your opening intro scene..."></textarea>
            </div>
            <div class="scene-card">
                <h4><span>Scene 2</span> <span>0:15 - 0:30</span></h4>
                <textarea id="longP2" placeholder="Describe the secondary learning breakdown..."></textarea>
            </div>
            <div class="scene-card">
                <h4><span>Scene 3</span> <span>0:30 - 0:45</span></h4>
                <textarea id="longP3" placeholder="Detail an illustrative example graphic..."></textarea>
            </div>
            <div class="scene-card">
                <h4><span>Scene 4</span> <span>0:45 - 1:00</span></h4>
                <textarea id="longP4" placeholder="Detail your closing review frame..."></textarea>
            </div>
        </div>

        <button class="btn" onclick="compileLongSequencer()">Compile & Render Scene 1</button>
        
        <div id="resultSection" class="video-box">
            <h3 style="margin-top:0;">Master Video Output</h3>
            <p id="statusText" style="color: #a5b4fc; font-size: 14px;"></p>
            <video id="longVideoPlayer" controls></video>
            <br>
            <button class="btn" style="width: auto; background: #818cf8; color: white;" id="copyBtn" onclick="copyActualVideoFile()">🎞️ Copy Video File</button>
            <button class="btn" style="width: auto; background: #2d2d34; color: white;" onclick="downloadVideo()">📥 Download Clip</button>
        </div>

        <br>
        <a href="index.html" class="back-link">← Back to Home Layout</a>
    </div>

    <script type="module">
        import { Client } from "https://jsdelivr.net";

        window.compileLongSequencer = async function() {
            const p1 = document.getElementById("longP1").value;
            if(!p1.trim()) return alert("Please specify at least your Scene 1 prompt instructions!");
            
            const box = document.getElementById("resultSection");
            const status = document.getElementById("statusText");
            const player = document.getElementById("longVideoPlayer");
            
            box.style.display = "block";
            player.style.display = "none";
            status.innerText = "Connecting to public cluster node. Compiling master assets...";

            try {
                const client = await Client.connect("multimodalart/Wan2.1-2B-T2V");
                const result = await client.predict("/predict", { prompt: p1 });
                status.innerText = "Compilation complete!";
                player.src = result.data.url;
                player.style.display = "block";
                player.play();
            } catch(e) {
                status.innerText = "Public server busy. Please try clicking render again!";
            }
        }

        window.downloadVideo = function() {
            const src = document.getElementById("longVideoPlayer").src;
            if(!src) return alert("No video data found! Please render a video first.");
            const link = document.createElement('a');
            link.href = src;
            link.download = 'SonaLearn_Master.mp4';
            link.click();
        }

        window.copyActualVideoFile = async function() {
            const src = document.getElementById("longVideoPlayer").src;
            const btn = document.getElementById("copyBtn");
            if(!src) return alert("No video found to copy!");
            btn.innerText = "⏳ Packaging Video...";
            try {
                const response = await fetch(src);
                const blob = await response.blob();
                const item = new ClipboardItem({ [blob.type]: blob });
                await navigator.clipboard.write([item]);
                btn.innerText = "✅ Video File Copied!";
                setTimeout(() => { btn.innerText = "🎞️ Copy Video File"; }, 2500);
            } catch (err) {
                btn.innerText = "❌ Copy Blocked";
                alert("Your browser security settings blocked copying the file directly. Please use Download instead!");
                setTimeout(() => { btn.innerText = "🎞️ Copy Video File"; }, 2500);
            }
        }
    </script>
</body>
</html>
